# MongoDB
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://localhost:27017/smart_campus}
spring.mongodb.database=${SPRING_MONGODB_DATABASE:smart_campus}

# Server
server.port=${SERVER_PORT:8081}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# JWT
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Auth bootstrap
app.auth.admin-emails=${APP_AUTH_ADMIN_EMAILS:}
